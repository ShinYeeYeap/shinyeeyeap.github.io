<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elementra webpage</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: rgb(239, 237, 226);
        }

        div.container {
            display: flex;
            align-items: flex-start;
            justify-content: space-evenly;
            padding: 15px;
            gap: 30px;
            margin: auto;
            word-wrap: break-word;
            width: 1024px;
        }

        div.building {
            background-color: white;
            align-items: center;
            border: 1px;
            border-radius: 10px;
            padding: 20px;
            max-width: 400px;
            width: 30%;
        }

        img {
            border-radius: 10px;
        }

        div.word {
            letter-spacing: normal;
            margin: 20px 10px 20px 10px;
        }

        h1 {
            font-size: 20px;
        }

        p {
            font-weight: 100;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="building"><img src="images/img1.jpg" alt="image 1" width="100%">
            <div class="word">
                <h1>Residential Project</h1>
                <p>we build sustainable and modern homes for comfortable living.</p>
            </div>
        </div>
        <div class="building"><img src="images/img2.jpg" alt="image 2" width="100%">
            <div class="word">
                <h1>Commercial spaces</h1>
                <p>We create efficient, inspiring workspaces for businesses of allo sizes.</p>
            </div>
        </div>
        <div class="building"><img src="images/img3.jpg" alt="image 3" width="100%">
            <div class="word">
                <h1>Infranstructure works</h1>
                <p>We develop strong, reliable infrastructure for growing businesses.</p>
            </div>
        </div>
    </div>
</body>

</html>
