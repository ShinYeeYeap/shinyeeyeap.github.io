<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div.head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15 0 15;

        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            padding: 30px 4px 30px 40px;
        }

        button.Request {
            color: black;
            background-color: white;
            border: 1px solid black;
            border-radius: 10px;
            padding: 15px 25px 15px 25px;
        }

        div.logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        div.menubar {
            display: flex;
            align-items: center;
            gap: 50px;
        }
    </style>
</head>

<body>
    <div class="head">
        <div class="logo">
            <img src="images/icon.png" alt="icon" width="35px">
            <h1>Positivus</h1>
        </div>
        <div class="menubar">
            <div>About us</div>
            <div>Services</div>
            <div>Use Cases</div>
            <div>Pricing</div>
            <div>Blog</div>
            <div><button class="Request">Request a quote</button></div>
        </div>
    </div>

</body>

</html>
