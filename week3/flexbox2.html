<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div.head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15 0 15;

        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            padding: 30px 4px 30px 40px;
        }

        button.Request {
            color: black;
            background-color: white;
            border: 1px solid black;
            border-radius: 10px;
            padding: 15px 25px 15px 25px;
        }

        div.logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        div.menubar {
            display: flex;
            align-items: center;
            gap: 50px;
        }

        div.bd {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 25px 20px 25px 20px;
            font-size: 40px;
        }

        div.subtitle {
            font-size: 60px;
        }

        p.sentence {
            font-size: 25px;
        }

        button.blackbutton {
            color: white;
            background-color: black;
            border-radius: 15px;
            padding: 25px;
            font-size: 20px;
            border: none;
        }
    </style>
</head>

<body>
    <div class="head">
        <div class="logo">
            <img src="images/icon.png" alt="icon" width="35px">
            <h1>Positivus</h1>
        </div>
        <div class="menubar">
            <div>About us</div>
            <div>Services</div>
            <div>Use Cases</div>
            <div>Pricing</div>
            <div>Blog</div>
            <div><button class="Request">Request a quote</button></div>
        </div>
    </div>
    <div class="bd">
        <div class="paragraph">
            <h1 class="subtitle">Navigating the <br>digital landscape<br> for success </h1>
            <p class="sentence">Our digital marketing agency helps businesses<br> grow and succeed online through a
                range of<br>
                services including SEO, PPC, social media marketing,<br> and content creation.</p>
            <p><button class="blackbutton">Book a consultation</button></p>
        </div><img src="images/Illustration.png" alt="Illustration" width="45%">
    </div>
</body>

</html>
