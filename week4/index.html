<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>responsive page</title>
</head>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');

    body {
        margin: 0px;
        background-color: rgb(255, 248, 240);
        color: rgb(255, 248, 240);
        background-image: url(images/background3.jpeg);
        font-family: "Roboto";
    }

    div.header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background-color: rgb(192, 133, 82);
        padding: 10px 20px 10px 20px;
    }

    div.logo {
        display: flex;
    }

    div.headmedia {
        display: flex;
        justify-content: space-between;
        gap: 10px;
    }

    div.profilepic {
        display: flex;
        flex-direction: column;
        align-items: center;

    }

    img.propic {
        border-radius: 100px;
        padding: 30px;
    }

    div.exercise {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 40px;

    }

    div.exercisebox {
        display: flex;

        background-color: rgba(140, 90, 60);
        padding: 20px 80px;
        gap: 10px;
        align-items: center;
        flex-direction: column;
        border-radius: 20px;

    }

    div.exeborder {
        display: flex;
        align-items: center;
        padding: 0 80px;
        border-bottom: 1px solid;


    }

    img.calander {
        max-width: 30px;
    }

    a {
        text-decoration: none;
    }

    div.wkbox {
        padding: 52px;
        align-items: center;
    }

    div.bigexebox {
        display: flex;
        align-items: center;
        background-color: rgba(140, 90, 60);
        padding: 20px;
        gap: 10px;
        flex-direction: column;
        border-radius: 20px;
    }

    div.bigboxbor {
        display: flex;
        align-items: center;
        border-bottom: 1px solid;
        padding: 0px 500px;
    }

    div.footer {
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        background-color: rgb(75, 46, 43);
        padding: 30px 0px 0px 0px;
        margin: auto;


    }

    h2 {
        padding-left: 10px;
    }

    div.socialfoot {
        gap: 10px;
    }
</style>

<body>
    <div class="header">
        <div class="logo">
            <h1>Logo</h1>
        </div>

        <div class="headmedia">
            <img src="images/fblogo.png" alt="Facebook" width="30px">
            <img src="images/walogo.png" alt="WhatsApp" width="30px">
            <img src="images/inslogo.png" alt="Instagram" width="30px">
        </div>
    </div>

    <div class="profile">
        <div class="profilepic">
            <img class="propic" src="images/profilepic.jpg" alt="Profile Pic" width="200px">
            <h2>Yeap Shin Yee</h2>
            <h3>Web Publishing</h3>
            <p>Hello! Im Yeap Shin Yee, an art student. Welcome to my personal portfolio.</p>
        </div>
    </div>
</body>

<div class="exercise">
    <div class="exercisebox">
        <div class="exeborder">
            <img class="calander" src="images/calendericon.jpeg" alt="Calander" width="100%">
            <h2>Week 2</h2>
        </div>
        <div class="exelink">
            <p><a href="http://127.0.0.1:5500/week2/button.html" target="_blank">Exercise 1</a></p>
            <p><a href="http://127.0.0.1:5500/week2/self-intro.html" target="_blank">Exercise 2</a></p>
        </div>
    </div>
    <div class="exercisebox">
        <div class="exeborder">
            <img class="calander" src="images/calendericon.jpeg" alt="Calander" width="100%">
            <h2>Week 3</h2>
        </div>
        <div class="exelink">
            <p><a href="http://127.0.0.1:5500/week3/flexbox1.html" target="_blank">Exercise 1</a></p>
            <p><a href="http://127.0.0.1:5500/week3/flexbox2.html" target="_blank">Exercise 2</a></p>
        </div>
    </div>
    <div class="exercisebox">
        <div class="exeborder">
            <img class="calander" src="images/calendericon.jpeg" alt="Calander" width="100%">
            <h2>Week 4</h2>
        </div>
        <div class="exelink">
            <p><a href="http://127.0.0.1:5500/week2/button.html" target="_blank">Exercise 1</a></p>
            <p><a href="http://127.0.0.1:5500/week2/self-intro.html" target="_blank">Exercise 2</a></p>
        </div>
    </div>
</div>
<div class="wkbox">
    <div class="bigexebox">
        <div class="bigboxbor">
            <img class="calander" src="images/calendericon.jpeg" alt="Calander" width="100%">
            <h2>Week 5</h2>
        </div>
        <div class="exelink">
            <p><a href="" target="_blank">Exercise 1</a></p>
            <p><a href="" target="_blank">Exercise 2</a></p>
        </div>
    </div>
</div>
<div class="footer">
    <div class="socialfoot">
        <img src="images/fblogo.png" alt="Facebook" width="30px">
        <img src="images/walogo.png" alt="WhatsApp" width="30px">
        <img src="images/inslogo.png" alt="Instagram" width="30px">
    </div>
    <div class="footword">
        <p>@ 2024 Yeap Shin Yee. All rights reserved.</p>
    </div>
</div>

</body>

</html>
