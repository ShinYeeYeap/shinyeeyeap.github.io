<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button</title>
    <style>
        button {
            color: white;
            background-color: black;
            padding: 15px 20px 15px 20px;
            font-weight: normal;
            margin: 10px;
            border: none;

        }

        button.Sign {
            color: white;
            background-color: rgb(66, 144, 61);
            padding: 10px 20px 10px 20px;
            font-weight: bold;
            border: 60px;
            border-radius: 5px;
        }

        button.add {
            color: black;
            background-color: rgb(241, 201, 55);
            font-weight: normal;
            border: none;
            border-radius: 20px;
            padding: 10px 50px 10px 50px;
        }

        button.get {
            color: white;
            background-color: rgb(125, 86, 174);
            padding: 10px 25px 10px 25px;
            border: 5px;
            border-radius: 3px;
            font-weight: bold;
        }

        button.Down {
            color: rgb(125, 125, 125);
            background-color: white;
            padding: 13px 25px 13px 25px;
            border: 1px solid rgb(147, 144, 144);
            border-radius: 5px;
            font-weight: bold;
        }

        button.apply {
            color: white;
            background-color: rgb(38, 95, 187);
            padding: 10px 20px 10px 20px;
            border: 1px rgb(38, 95, 187);
            border-radius: 25px;
            font-weight: bold;
        }

        button.save {
            color: rgb(52, 101, 179);
            background-color: white;
            padding: 10px 25px 10px 25px;
            border: 1px solid rgb(52, 101, 179);
            border-radius: 25px;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <button class="Request">Request now</button>
    <button class="Sign">Sign up</button>
    <button class="add">Add to Cart</button>
    <button class="get">Get started</button>
    <button class="Down">Download</button>
    <button class="apply">Apply on company website</button>
    <button class="save">Save</button>

</body>

</html>
