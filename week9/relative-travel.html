<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/relative-travel.css">
</head>

<body>

    <body>
        <div class="trip">
            <div class="tripcard">
                <div><img class="image" src="images/japan.jpg" alt="japan" width="100%"></div>
                <h3>Trip to Japan</h3>
                <p>1-10 April| by John Lee</p>
                <div class="icon">
                    <img src="images/leaf.png" alt="eco" width="24px">
                    <img src="images/gps.png" alt="map" width="24px">
                    <img src="images/send.png" alt="send" width="24px">
                </div>
                <div class="activity">
                    <div class="people"><img src="images/building.png" alt="building" width="24px">
                        <p>30 people going</p>
                    </div>
                    <div><img src="images/heart.png" alt="fav" width="24px">
                    </div>
                </div>
                <div class="overlaybox">
                    <div class="citypic"><img class="city" src="images/Fujiyoshida.jpg" alt="City of japan"
                            width="50px">
                    </div>
                    <div class="citytext">
                        <p>On going</p>
                        <h3>City of Fujiyoshida</h3>
                        <p class="completed"><span>40%</span>completed</p>
                        <img src="images/bar.JPG" alt="bar" width="100px">
                    </div>
                </div>
            </div>
            <div class="tripcard">
                <div><img class="image" src="images/iceland.jpg" alt="iceland" width="100%"></div>
                <h3>Trip to Iceland</h3>
                <p>1-18 August| by Anna Smith</p>
                <div class="icon">
                    <img src="images/leaf.png" alt="eco" width="24px">
                    <img src="images/gps.png" alt="map" width="24px">
                    <img src="images/send.png" alt="send" width="24px">
                </div>
                <div class="activity">
                    <div class="people"><img src="images/building.png" alt="building" width="24px">
                        <p>25 people going</p>
                    </div>
                    <div><img src="images/heart.png" alt="fav" width="24px"></div>
                </div>
                <div class="overlaybox">
                    <div class="citypic"><img class="city" src="images/Reykjavik.jpg" alt="City of iceland"
                            width="50px">
                    </div>
                    <div class="citytext">
                        <p>On going</p>
                        <h3>City of Reykjavik</h3>
                        <p class="completed"><span>40%</span>completed</p>
                        <img src="images/bar.JPG" alt="bar" width="100px">
                    </div>
                </div>
            </div>
        </div>

    </body>

</html>
